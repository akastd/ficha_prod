<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#1f4f7a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Fichas">
  <meta name="robots" content="noindex, nofollow, noarchive">
  <title>Relatório de Clientes - Fichas Técnicas</title>
  <script>
    (function () {
      try {
        var theme = localStorage.getItem('site_theme_preference') === 'dark' ? 'dark' : 'light';
        document.documentElement.setAttribute('data-theme', theme);
      } catch (_) {
        document.documentElement.setAttribute('data-theme', 'light');
      }
    })();
  </script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="css/design-tokens.css">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/components/index.css">
  <link rel="stylesheet" href="css/dashboard.css">
  <link rel="stylesheet" href="css/relatorios-cliente.css">
  <link rel="manifest" href="/manifest.webmanifest">
  <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
</head>

<body class="page-relatorio-clientes">
  <div class="container">
    <header>
      <div class="header-content">
        <div>
          <h1><i class="fas fa-users"></i> Relatório de Clientes</h1>
        </div>
        <div class="header-actions">
          <a href="/" class="btn btn-secondary">
            <i class="fas fa-house"></i>
            <span>In&iacute;cio</span>
          </a>
          <a href="/kanban" class="btn btn-primary">
            <i class="fas fa-table-columns"></i>
            <span>Quadro de Produção</span>
          </a>
          <a href="/clientes" class="btn btn-secondary">
            <i class="fas fa-users"></i>
            <span>Clientes</span>
          </a>
          <a href="/relatorios" class="btn btn-warning">
            <i class="fas fa-chart-bar"></i>
            <span>Relatórios</span>
          </a>
          <a href="/ficha" class="btn btn-primary btn-new-ficha-highlight">
            <i class="fas fa-plus"></i>
            <span>Nova Ficha</span>
          </a>
        </div>
      </div>
    </header>

    <main class="cliente-report-layout">
      <aside class="cliente-sidebar card">
        <div class="card-header">
          <i class="fas fa-address-book"></i>
          <span>Clientes</span>
        </div>
        <div class="card-body cliente-sidebar-body">
          <div class="cliente-search-wrap">
            <input id="clienteSearchInput" type="search" class="form-control" placeholder="Buscar por nome do cliente">
          </div>
          <div id="clienteList" class="cliente-list" aria-live="polite"></div>
          <button id="btnLoadMoreClientes" type="button" class="btn btn-secondary cliente-load-more" hidden>
            <i class="fas fa-angles-down"></i>
            <span>Carregar mais</span>
          </button>
        </div>
      </aside>

      <section class="cliente-detail card">
        <div id="clienteDetailContent" class="card-body cliente-detail-body">
          <div class="empty-placeholder empty-placeholder--report">
            <div class="empty-placeholder-icon">
              <i class="fas fa-file-lines"></i>
            </div>
            <h3>Nenhuma ficha selecionada</h3>
            <p>Selecione um cliente na lista para visualizar o resumo de fichas, produtos e histórico.</p>
            <div class="empty-placeholder-hint">
              <i class="fas fa-arrow-left"></i>
              <span>Use a busca para encontrar o cliente mais rápido.</span>
            </div>
          </div>
        </div>
      </section>
    </main>
  </div>

  <script src="js/theme.js"></script>
  <script src="js/system-log.js"></script>
  <script src="js/utils/common.js"></script>
  <script src="js/utils/toast.js"></script>
  <script src="js/api-client.js"></script>
  <script type="module" src="js/relatorios-cliente/main.js"></script>
</body>

</html>
