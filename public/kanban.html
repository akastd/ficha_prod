<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#1f4f7a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Fichas">
    <meta name="robots" content="noindex, nofollow, noarchive">
    <title>Quadro de Produção - Fichas Técnicas</title>
    <script>
        (function () {
            try {
                var theme = localStorage.getItem('site_theme_preference') === 'dark' ? 'dark' : 'light';
                document.documentElement.setAttribute('data-theme', theme);
            } catch (_) {
                document.documentElement.setAttribute('data-theme', 'light');
            }
        })();
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/design-tokens.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/components/index.css">
    <link rel="stylesheet" href="css/dashboard.css">
    <link rel="stylesheet" href="css/kanban.css">
    <link rel="manifest" href="/manifest.webmanifest">
    <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
</head>

<body>
    <div class="container kanban-page-container">
        <header>
            <div class="header-content">
                <div>
                    <h1><i class="fas fa-table-columns"></i> Quadro de Produção</h1>
                </div>
                <div class="header-actions">
                    <a href="/" class="btn btn-secondary">
                        <i class="fas fa-house"></i>
                        <span>In&iacute;cio</span>
                    </a>
                    <a href="/dashboard" class="btn btn-secondary">
                        <i class="fas fa-arrow-left"></i>
                        <span>Dashboard</span>
                    </a>
                    <a href="/clientes" class="btn btn-secondary">
                        <i class="fas fa-users"></i>
                        <span>Clientes</span>
                    </a>
                    <a href="/relatorios" class="btn btn-warning">
                        <i class="fas fa-chart-bar"></i>
                        <span>Relatórios</span>
                    </a>
                    <a href="/ficha" class="btn btn-primary">
                        <i class="fas fa-plus"></i>
                        <span>Nova Ficha</span>
                    </a>
                </div>
            </div>
        </header>

        <main class="kanban-layout">
            <section class="card kanban-board-card">
                <div class="card-header kanban-board-header">
                    <div class="kanban-board-title">
                        <i class="fas fa-grip"></i>
                        <input type="text" id="filterClienteKanban" class="form-control kanban-title-search-input"
                            placeholder="Buscar por Nome" aria-label="Buscar por Nome">
                        <div class="kanban-global-filter-wrap">
                            <button type="button" id="kanbanGlobalFilterToggle" class="kanban-sort-date-btn kanban-global-filter-toggle"
                                title="Filtrar cartões" aria-label="Filtrar cartões" aria-haspopup="true" aria-expanded="false">
                                <i class="fas fa-filter" aria-hidden="true"></i>
                            </button>
                            <div id="kanbanGlobalFilterMenu" class="kanban-sort-menu kanban-global-filter-menu" role="menu" hidden></div>
                        </div>
                    </div>
                    <div class="kanban-board-header-actions">
                        <span id="kanbanTotalCount" class="badge">0 fichas</span>
                        <button type="button" id="btnNovoCartaoKanban" class="btn btn-primary btn-icon"
                            title="Criar cartão manual" aria-label="Criar cartão manual">
                            <i class="fas fa-plus"></i>
                            <span>Novo Cartão</span>
                        </button>
                        <button type="button" id="badgeFiltroSemanaAtualKanban" class="badge kanban-filter-badge"
                            title="Filtrar entregas desta semana (até sexta-feira)" aria-label="Filtrar entregas desta semana (até sexta-feira)" aria-pressed="false">
                            Para Essa Semana
                        </button>
                        <button type="button" id="btnAtualizarKanban" class="btn btn-secondary btn-icon kanban-refresh-btn"
                            title="Atualizar quadro" aria-label="Atualizar quadro">
                            <i class="fas fa-rotate"></i>
                        </button>
                    </div>
                </div>
                <div class="card-body kanban-board-body">
                    <div class="kanban-board-scroll">
                        <div id="kanbanBoard" class="kanban-board">
                            <section class="kanban-column" data-status="pendente">
                                <header class="kanban-column-header pendente">
                                    <h2><i class="fas fa-hourglass-half"></i> Preparando Arte</h2>
                                    <div class="kanban-column-header-tools">
                                        <span class="kanban-column-count" data-count-for="pendente">0</span>
                                        <button type="button" class="kanban-sort-date-btn" data-action="sort-column-date" data-status="pendente" title="Organizar por data">
                                            <i class="fas fa-calendar-days" aria-hidden="true"></i>
                                        </button>
                                    </div>
                                </header>
                                <div class="kanban-column-list" id="kanban-list-pendente"></div>
                            </section>

                            <section class="kanban-column" data-status="exportando">
                                <header class="kanban-column-header exportando">
                                    <h2><i class="fas fa-file-export"></i> Exportado/Arte Separada</h2>
                                    <div class="kanban-column-header-tools">
                                        <span class="kanban-column-count" data-count-for="exportando">0</span>
                                        <button type="button" class="kanban-sort-date-btn" data-action="sort-column-date" data-status="exportando" title="Organizar por data">
                                            <i class="fas fa-calendar-days" aria-hidden="true"></i>
                                        </button>
                                    </div>
                                </header>
                                <div class="kanban-column-list" id="kanban-list-exportando"></div>
                            </section>

                            <section class="kanban-column" data-status="fila_impressao">
                                <header class="kanban-column-header fila_impressao">
                                    <h2><i class="fas fa-print"></i> Impresso/Fotolito Impresso</h2>
                                    <div class="kanban-column-header-tools">
                                        <span class="kanban-column-count" data-count-for="fila_impressao">0</span>
                                        <button type="button" class="kanban-sort-date-btn" data-action="sort-column-date" data-status="fila_impressao" title="Organizar por data">
                                            <i class="fas fa-calendar-days" aria-hidden="true"></i>
                                        </button>
                                    </div>
                                </header>
                                <div class="kanban-column-list" id="kanban-list-fila_impressao"></div>
                            </section>

                            <section class="kanban-column" data-status="sublimando">
                                <header class="kanban-column-header sublimando">
                                    <h2><i class="fas fa-spray-can-sparkles"></i> Sublimando/Na Estamparia</h2>
                                    <div class="kanban-column-header-tools">
                                        <span class="kanban-column-count" data-count-for="sublimando">0</span>
                                        <button type="button" class="kanban-sort-date-btn" data-action="sort-column-date" data-status="sublimando" title="Organizar por data">
                                            <i class="fas fa-calendar-days" aria-hidden="true"></i>
                                        </button>
                                    </div>
                                </header>
                                <div class="kanban-column-list" id="kanban-list-sublimando"></div>
                            </section>

                            <section class="kanban-column" data-status="na_costura">
                                <header class="kanban-column-header na_costura">
                                    <h2><i class="fas fa-shirt"></i> Costura/Em Revisão</h2>
                                    <div class="kanban-column-header-tools">
                                        <span class="kanban-column-count" data-count-for="na_costura">0</span>
                                        <button type="button" class="kanban-sort-date-btn" data-action="sort-column-date" data-status="na_costura" title="Organizar por data">
                                            <i class="fas fa-calendar-days" aria-hidden="true"></i>
                                        </button>
                                    </div>
                                </header>
                                <div class="kanban-column-list" id="kanban-list-na_costura"></div>
                            </section>
                        </div>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <div id="kanbanViewModal" class="kanban-view-modal" role="dialog" aria-modal="true"
        aria-labelledby="kanbanViewModalTitle" hidden aria-hidden="true">
        <div class="kanban-view-modal-overlay" data-close-modal="true"></div>
        <div class="kanban-view-modal-content" role="document">
            <div class="kanban-view-modal-header">
                <div class="kanban-view-modal-title-wrap">
                    <strong id="kanbanViewModalTitle" class="kanban-view-modal-title">Visualização da Ficha</strong>
                    <span class="kanban-view-modal-subtitle">Ficha <span id="kanbanViewFichaId">#-</span></span>
                </div>
                <button type="button" id="btnCloseKanbanViewModal" class="kanban-view-modal-close" title="Fechar">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div class="kanban-view-modal-body">
                <div id="kanbanViewLoading" class="kanban-view-modal-loading" aria-live="polite">
                    <i class="fas fa-spinner fa-spin"></i>
                    <span>Carregando preview...</span>
                </div>
                <iframe id="kanbanViewFrame" class="kanban-view-modal-iframe" title="Visualização da Ficha"
                    loading="lazy"></iframe>
            </div>
        </div>
    </div>

    <div id="kanbanCreateCardModal" class="kanban-create-modal" role="dialog" aria-modal="true"
        aria-labelledby="kanbanCreateCardTitle" hidden aria-hidden="true">
        <div class="kanban-create-modal-overlay" data-close-create-modal="true"></div>
        <div class="kanban-create-modal-content" role="document">
            <div class="kanban-create-modal-header">
                <strong id="kanbanCreateCardTitle" class="kanban-create-modal-title">Novo Cartão Manual</strong>
                <button type="button" id="btnCloseKanbanCreateModal" class="kanban-create-modal-close" title="Fechar">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <form id="kanbanCreateCardForm" class="kanban-create-modal-form">
                <label class="kanban-create-modal-field">
                    <span>Título do cartão</span>
                    <input type="text" id="kanbanCreateTitulo" class="form-control" maxlength="120"
                        placeholder="Ex.: Camisetas Evento Interno" required>
                </label>
                <label class="kanban-create-modal-field">
                    <span>Data de entrega</span>
                    <input type="date" id="kanbanCreateDataEntrega" class="form-control" required>
                </label>
                <label class="kanban-create-modal-field">
                    <span>É evento?</span>
                    <select id="kanbanCreateEvento" class="form-control">
                        <option value="nao" selected>Não</option>
                        <option value="sim">Sim</option>
                    </select>
                </label>
                <label class="kanban-create-modal-field">
                    <span>Tipo de arte</span>
                    <select id="kanbanCreateArte" class="form-control">
                        <option value="">Não informado</option>
                        <option value="sem_personalizacao">Sem Personalização</option>
                        <option value="sublimacao">Sublimação</option>
                        <option value="serigrafia">Serigrafia</option>
                        <option value="bordado">Bordado</option>
                        <option value="dtf">DTF Têxtil</option>
                        <option value="transfer">Transfer</option>
                        <option value="sublimacao_serigrafia">Sublimação e Serigrafia</option>
                        <option value="serigrafia_dtf">Serigrafia e DTF</option>
                        <option value="serigrafia_bordado">Serigrafia e Bordado</option>
                    </select>
                </label>
                <label class="kanban-create-modal-field">
                    <span>Tecido</span>
                    <input type="text" id="kanbanCreateTecido" class="form-control" maxlength="120"
                        placeholder="Ex.: Helanca">
                </label>
                <label class="kanban-create-modal-field">
                    <span>Etapa inicial</span>
                    <select id="kanbanCreateEtapa" class="form-control">
                        <option value="pendente" selected>Preparando Arte</option>
                        <option value="exportando">Exportado/Arte Separada</option>
                        <option value="fila_impressao">Impresso/Fotolito Impresso</option>
                        <option value="sublimando">Sublimando/Na Estamparia</option>
                        <option value="na_costura">Costura/Em Revisão</option>
                    </select>
                </label>
                <label class="kanban-create-modal-field">
                    <span>Status do cartão</span>
                    <select id="kanbanCreateSupplyStatus" class="form-control">
                        <option value="tudo_ok" selected>Tudo ok</option>
                        <option value="sem_tecido">Sem tecido</option>
                        <option value="sem_tinta">Sem tinta</option>
                        <option value="sem_papel">Sem papel</option>
                        <option value="pendencias">Pendências</option>
                    </select>
                </label>
                <div class="kanban-create-modal-actions">
                    <button type="button" id="btnCancelKanbanCreateModal" class="btn btn-secondary">Cancelar</button>
                    <button type="submit" id="btnSubmitKanbanCreateModal" class="btn btn-primary">
                        <i class="fas fa-plus"></i>
                        <span>Criar cartão</span>
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script src="js/theme.js"></script>
    <script src="js/system-log.js"></script>
    <script src="js/utils/common.js"></script>
    <script src="js/utils/toast.js"></script>
    <script src="js/api-client.js"></script>
    <script type="module" src="js/kanban/main.js"></script>
    <script nomodule src="js/kanban.js"></script>
</body>

</html>
